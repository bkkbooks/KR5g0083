front:
  text: 玄和子十二月卦金訣吹九
  hash: sha256:bb00af3622657963ea68cade661627234feab76e7ef939e49feec2e49a3879ac
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0083_SJB_000-320594c, image: sjb/32/320594c.png}
body:
  text: 復卦初爻起一陽子時符節轉天罡復卦者主十一月一陽爻初生丹象以十一月爲初春用事故子時還丹符須順天罡而行火也玄和子意用是象日是法高奇妙手修金鼎清淨齋心奉玉皇十二内禁日凡修丹之人乃是玄玄妙手也須潔淨尊奉如對高真玉皇者也白虎未能全制伏青龍從此漸翺翔白虎與青龍俱在鼎中白虎金未能制伏青龍龍方得文火漸爲騰躍之也神仙自古皆同祕誰道還丹别有方自古至今神仙皆祕借此道前賢後聖亦只同此一方故無别理唯丹之名號則不一耳云臨卦分明運赤龍中春時節雨濛濛赤龍者爲二爻生火漸大已是中春節候青龍昇降如雨濛濛董董之逃也海波漸減高蓬島玉户潜扃避隙風鑪皆有門門有扇開閉以避隙風也配合已知歸敏手燮調須順有玄功鉛汞皆先須配合得訣方可入昇卦用燮調運其火候無差方生化成玄功也秪縁會得乾坤數從此三清道路通修鍊之法先須得乾坤水火之數方始運丹丹成則三清神仙無有不通泰卦方知二氣平鼎中騰躍漸分明龍吟虎嘯真堪聽電激雷奔轉轉獰青龍與白虎在鼎逓相咽齒食運丹之人專聽嬰兒之聲以停騰火候火則如藏畜電雷之聲漸行武火春景已闌扃北户火雲將熾映嚴城至泰卦已行盡春令符節鑪北户皆却閉之火漸武映鑪而明也城即鑪也用之如城也幾人知此長生訣功滿全家上玉清謂世人但貪愛名利須死虚生萬萬人中無一人知有長生之道是此丹也如人修丹成陰功又滿他日必上昇也壯卦初臨道若何火火漸進赤雲多丹象壯卦四陽爻爲夏首火漸武也故云赤雲多也壺中日月能符節鼎内風雷湧碧波日月陰陽二氣也謂能應時運其節符只鼎内自在如風雷湧其鉛汞也側耳漸忻聞火微㸃頭時復許煙羅火罡羅公聞鼎内水滴火熬之聲則青龍漸困丹轉有功看看便是還丹熟萬訣千經更莫過凡聞鼎中火熬之聲丹漸熟謂法不能過也夬卦中分夏景暄一陰非久變純乾夬卦五陽爻主是丹象中夏之節漸及至巳則爲乾卦故云非久乾之至也解擒白虎能容易降伏青龍豈偶然五陽爻主則行火轉武甚也至此時青龍白虎自相制伏也斬漸蓋中飛紫粉看看鼎内化紅蓮凡採牙後運丹至此節候飛上鼎蓋者如紫粉色中及四面者如紅蓮花色也待逃數盡終歸去却反金壇舊峒天凡丹成服丹之人皆千日爲限然須行陰功在世逃數足後方隨藥成功火者白日上昇或夜間上昇城市死屍解也天解化世華陽洞有金丹壇百丈是八大洞天也乾卦巡行六位終火光赫赫滿鑪紅行六位至乾卦丹家謂陽爻爲火鑪炎光即丹至此時武火最大赫赫極盛之貌所以滿鑪紅也燮調至此齊諸聖愛護將昇入九宫還丹至此火極無龍之時内外燮調海水水俱竭諸聖皆愛護將入午位即南方离爲九宫雷息電收蒼海竭龍嘯虎困鼎壺空易曰亢龍有悔即陽極爲亢當此之時青龍被白虎囓食已盡白虎已自用伏雷電寂臨鼎空無其青聲也先生妙手通玄理攢簇陰陽一室中運丹之人得到此位皆齊諸聖玄能也故曰妙通玄理攅簇陰陽者世人雖留心大道多不知年象月亦象唯日時是訣攢簇陰陽通於造化至理也老子歌云聖人奪得造化旨手摶日月安鑪裏微微騰倒天地精攅簇陰陽走神鬼日魂月魄若箇識識者便是真仙子鍊之餌之千日期身内無陰那得死姤卦看看已太平離宫依舊布祥新雲收兩歇時無事香馥花紅别是春姤卦一陰生易曰履霜堅氷陰始凝也丹至此漸已太平離宫午之位也光者火也金虎元君兩界同符故言依舊也鼎内雲雨收歇丹以香紅如春姤也還丹自然歸有道功夫何處訪同人丹土有九還七返此謂從十一月還陽至五月却返其陰數各有其道也若運丹以此功夫覓同人似我者何處有也長生到此非容易爲學三茅繼後塵長生之道莫過於大丹若到此符節知其妙用實罕有人若到此則非容易而求也可繼三茅真人之道塵也遁卦元來景正秋却歸坤位火雲收人間七月爲中秋丹家六月爲中秋言歸坤西南也陰爻漸生陽爻收歛也旋添海水聽更漏暗想紅霞滿十洲鑪上有水海入陰即減室内想有刻漏以則時候丹到此想滿鼎紅如霞之光也洞裏姓名元有姓鼎中龍虎已無憂若解如此運丹已是洞府録其姓名有神仙之分謂丹到二陰爻生則無衝失之爲也時人昧道攻胎息誰識還丹號紫遊時人但則只學胎息氣術以求長生殊不知胎息是小術未能换骨化形故葛仙翁云道士盡愚癡唯學於胎息豈知有紫遊之丹白日上升之道矣否卦將來喜稱心三陽已退却歸陰黄芽結後花爭發渌水添來海自深否卦三陽爻已變爲陰爻故之歸陰也黄芽化大丹如花得春自然香紅水海已添乃半故深也解向室中權造化却歸塵裏混光陰修丹之人於一室中運用乾坤二卦權握造化生成丹藥如天地生産萬物一般丹之後𪔛鼓行功却在人間也因嗟久别當年侣金鼎無緣何處尋謂常時同修丹之人值干戈之後久别不知音信不能同縁成其金鼎也觀卦依希道已終酉時符節恰分中酉時是修丹經訣吉當其中以亦後學酉八月也六月當天地分中位也自知火候通玄妙想得還丹滿鼎紅言火候既得玄妙丹必然成其紅粉也處世豈能憂白髮住山偏解伏青龍既有紅粉之丹又何憂白髮不再黑居山得道言解伏青龍成丹神仙志士雖言了未斷凡心不可窮云我此金丹候之詩皆是神仙至訣盡法俱已言了若几常之人心生浮薄未契道縁不可窮道也剥卦輪還二氣全修丹到此號神仙謂五陰已還陰陽將全丹得到此則神仙也玉堂春晏籠香靄金鼎花紅坼瑞蓮玉堂即丹室也金鼎即丹鼎也丹至此時自然香風滿室鼎如新開紅蓮之狀海浪自然澄碧水夕陽容易泛流年陽火漸退上水即添澄靜不動時已夕陽還丹火將中一年之候故泛流年世人只貪紅塵事豈信玄中别有玄言世人但知名利財色爲樂豈知有大還丹也金丹從天運有假爲基地於一中取自然而成矣坤卦須知位已週從他文火自遲留至十月已十二位周帀火已微細純陰結時文火自遲留却將香簡朝元斗重整衣冠祝太立行水火陰陽數已周足運丹先生遂將香簡於壇上朝謝天地真靈再祈星斗固護丹竈免有邪氣侵也愛護鑪寒方敢看徘徊心想未嘗休來晨禮謝開金鼎紫粉霞光最上頭至來日鼎寒先焚香禮供天地真仙方開得見其丹已成中最佳飛上鼎蓋如紫粉色光明者號紫遊丹成矣玄和子十二月卦金訣
